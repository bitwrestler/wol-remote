<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Wake Ollama Desktop</title>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #e2e8f0 }
  body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: var(--card); padding: 2rem; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.4); text-align: center; width: 90%; max-width: 320px; }
  button { background: var(--accent); color: #0f172a; border: none; padding: 1rem 2rem; font-size: 1.1rem; font-weight: 600; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 1rem; }
  button:active { transform: scale(0.97); }
  .status { margin-top: 1rem; font-size: 0.9rem; opacity: 0.8; min-height: 1.5em; }
  input { width: 100%; padding: 0.6rem; background: #334155; border: 1px solid #475569; color: white; border-radius: 6px; margin-top: 0.5rem; box-sizing: border-box; }
</style>
</head>
<body>
<div class="card">
  <h2>🖥️ Wake Ollama PC</h2>
  <button id="btn">Wake Now</button>
  <div class="status" id="status"></div>
</div>
<script>
const btn = document.getElementById('btn');
const status = document.getElementById('status');
btn.onclick = async () => {
  btn.disabled = true; btn.textContent = "Sending..."; status.textContent = "";
  try {
    await fetch('/api/wake', {method:'POST', headers:{'Content-Type':'application/json'}});
    status.textContent = "✅ Packet sent. GPU will initialize in ~10-20s.";
  } catch(e) { status.textContent = "❌ Failed: " + e.message; }
  btn.disabled = false; btn.textContent = "Wake Now";
};
</script>
</body>
</html>
